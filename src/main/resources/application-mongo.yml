spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  config:
    activate:
      on-profile: mongo
  data:
    mongodb:
      host: localhost
      port: 27017
      database: productsdb
      # Se vuoi usare un URI MongoDB completo, puoi anche usare:
      # uri: mongodb://localhost:27017/productsdb
  thymeleaf:
    check-template-location: false  # Disabilita la ricerca di template se non usi Thymeleaf

logging:
  level:
    org:
      springframework: INFO
      springframework.data.mongodb.core.MongoTemplate: DEBUG
