<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>

    <link href="http://cdn.jsdelivr.net/webjars/bootstrap/3.3.4/css/bootstrap.min.css"
          th:href="@{/webjars/bootstrap/3.3.4/css/bootstrap.min.css}"
          rel="stylesheet" media="screen"/>
</head>
<body>
<div class="container">

    <div class="row">
        <div class="col-sm-6">
            <h2>Product List</h2>
        </div>
        <div class="col-sm-6 text-right">
            <a class="btn btn-success" th:href="@{/product/new}">Add New Product</a>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Description</th>
            <th>Price</th>
            <th>Image URL</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">ID</td>
            <td th:text="${product.description}">Description</td>
            <td th:text="${product.price}">Price</td>
            <td th:text="${product.imageUrl}">Image URL</td>

            <td>
                <!-- ROTTA CORRETTE /product/... -->
                <a class="btn btn-info btn-sm"
                   th:href="@{'/product/show/' + ${product.id}}">View</a>

                <a class="btn btn-warning btn-sm"
                   th:href="@{'/product/edit/' + ${product.id}}">Edit</a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{'/product/delete/' + ${product.id}}"
                   onclick="return confirm('Are you sure you want to delete this product?');">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
