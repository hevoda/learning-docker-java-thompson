<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Core Online Tutorial - List Products</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <link href="http://cdn.jsdelivr.net/webjars/bootstrap/3.3.4/css/bootstrap.min.css"
          th:href="@{/webjars/bootstrap/3.3.5/css/bootstrap.min.css}"
          rel="stylesheet" media="screen"/>

    <script src="http://cdn.jsdelivr.net/webjars/jquery/2.1.4/jquery.min.js"
            th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>

    <link href="../../static/css/spring-core.css"
          th:href="@{css/spring-core.css}" rel="stylesheet" media="screen"/>
</head>
<body>
<div class="container">
    <div th:if="${not #lists.isEmpty(productEntities)}">
        <h2>ProductEntity List</h2>
        <table class="table table-striped">
            <tr>
                <th>Id</th>
                <th>Description</th>
                <th>Price</th>
                <th>Image URL</th>
                <th>List</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
            <tr th:each="ProductEntity : ${productEntities}">
                <td th:text="${ProductEntity.id.toHexString()}"></td>
                <td th:text="${ProductEntity.description}"></td>
                <td th:text="${ProductEntity.price}"></td>
                <td th:text="${ProductEntity.imageUrl}"></td>
                <td><a th:href="${'/ProductEntity/show/' + ProductEntity.id.toHexString()}">View</a> </td>
                <td><a th:href="${'/ProductEntity/edit/' + ProductEntity.id.toHexString()}">Edit</a> </td>
                <td><a th:href="${'/ProductEntity/delete/' + ProductEntity.id.toHexString()}">Delete</a> </td>
            </tr>
        </table>
    </div>
    <div class="row">
        <div class="col-sm-3">
            <a href="/ProductEntity/new">New ProductEntity</a>
        </div>
    </div>
</div>

</body>
</html>
