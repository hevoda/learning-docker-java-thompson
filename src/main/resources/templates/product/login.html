<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Form</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center">Login</h2>

    <!-- Message if login fails -->
    <div th:if="${param.error}" class="alert alert-danger">
        <strong>Error!</strong> Invalid username and/or password.
    </div>

    <!-- Message if user logs out -->
    <div th:if="${param.logout}" class="alert alert-info">
        <strong>Success!</strong> You have been logged out.
    </div>

    <form th:action="@{/login}" method="post">
        <!-- CSRF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- Username field -->
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" class="form-control" required="true" placeholder="Enter username"/>
        </div>

        <!-- Password field -->
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" class="form-control" required="true" placeholder="Enter password"/>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.4/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
