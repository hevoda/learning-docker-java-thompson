<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Form</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <!-- Bootstrap CSS -->
    <link href="http://cdn.jsdelivr.net/webjars/bootstrap/3.3.4/css/bootstrap.min.css"
          th:href="@{/webjars/bootstrap/3.3.5/css/bootstrap.min.css}"
          rel="stylesheet" media="screen"/>

    <!-- Custom CSS -->
    <link href="../../static/css/spring-core.css"
          th:href="@{/css/spring-core.css}" rel="stylesheet" media="screen"/>
</head>
<body>
<div class="container">
    <h2>Product Details</h2>

    <form class="form-horizontal" th:object="${productDetails}" th:action="@{/product}" method="post">

        <!-- Errori generali -->
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            <p th:text="#{form.hasErrors}">There are validation errors</p>
        </div>

        <!-- Campo ID (nascosto) -->
        <input type="hidden" th:field="*{id}"/>

        <!-- Descrizione -->
        <div class="form-group" th:classappend="${#fields.hasErrors('description')} ? 'has-error'">
            <label class="col-sm-2 control-label">Description:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" th:field="*{description}" th:errorclass="has-error"/>
                <span class="help-block" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>
        </div>

        <!-- Prezzo -->
        <div class="form-group" th:classappend="${#fields.hasErrors('price')} ? 'has-error'">
            <label class="col-sm-2 control-label">Price:</label>
            <div class="col-sm-10">
                <input type="number" min="0" max="5000" step="0.01" class="form-control" th:field="*{price}" th:errorclass="has-error"/>
                <span class="help-block" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </div>
        </div>

        <!-- URL immagine -->
        <div class="form-group" th:classappend="${#fields.hasErrors('imageUrl')} ? 'has-error'">
            <label class="col-sm-2 control-label">Image URL:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" th:field="*{imageUrl}" th:errorclass="has-error"/>
                <span class="help-block" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></span>
            </div>
        </div>

        <!-- Pulsante di salvataggio -->
        <div class="row">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/product/list}" class="btn btn-default">Cancel</a>
            </div>
        </div>
    </form>
</div>

<!-- jQuery -->
<script src="http://cdn.jsdelivr.net/webjars/jquery/2.1.4/jquery.min.js"
        th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>
</body>
</html>
