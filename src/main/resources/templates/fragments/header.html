<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="">

<body>

<div th:fragment="header">

    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm mb-4">
        <div class="container">

            <!-- LOGO / BRAND -->
            <a class="navbar-brand fw-bold" th:href="@{/}">HERVODA LABS</a>

            <!-- MOBILE TOGGLER -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- MENU -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- LEFT SIDE -->
                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects/list}">Projects</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects/new}">New Project</a>
                    </li>

                </ul>

                <!-- RIGHT SIDE (USERNAME) -->
                <div class="d-flex align-items-center">
                    <span class="navbar-text text-light me-3"
                          sec:authorize="isAuthenticated()">
                        Welcome <strong sec:authentication="name"></strong>
                    </span>

                    <a class="btn btn-sm btn-primary"
                       th:href="@{/logout}"
                       sec:authorize="isAuthenticated()">
                        Logout
                    </a>
                </div>

            </div>

        </div>
    </nav>

</div>

</body>
</html>
