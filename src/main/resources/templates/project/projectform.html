<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Project Form</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <!-- Bootstrap CSS -->
    <link href="http://cdn.jsdelivr.net/webjars/bootstrap/3.3.5/css/bootstrap.min.css"
          th:href="@{/webjars/bootstrap/3.3.5/css/bootstrap.min.css}"
          rel="stylesheet" media="screen"/>

    <!-- Custom CSS -->
    <link th:href="@{/css/app.css}" rel="stylesheet" media="screen"/>
</head>

<body>
<div class="container">
    <h2>Project Details</h2>

    <form class="form-horizontal" th:object="${projectForm}" th:action="@{/project}" method="post">

        <!-- Errori generali -->
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
            <p>There are validation errors</p>
        </div>

        <!-- ID nascosto -->
        <input type="hidden" th:field="*{id}"/>

        <!-- NAME -->
        <div class="form-group" th:classappend="${#fields.hasErrors('name')} ? 'has-error'">
            <label class="col-sm-2 control-label">Name:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" th:field="*{name}" required/>
                <span class="help-block" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>
        </div>

        <!-- DESCRIPTION -->
        <div class="form-group" th:classappend="${#fields.hasErrors('description')} ? 'has-error'">
            <label class="col-sm-2 control-label">Description:</label>
            <div class="col-sm-10">
                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                <span class="help-block" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>
        </div>

        <!-- START DATE -->
        <div class="form-group" th:classappend="${#fields.hasErrors('startDate')} ? 'has-error'">
            <label class="col-sm-2 control-label">Start Date:</label>
            <div class="col-sm-10">
                <input type="date" class="form-control" th:field="*{startDate}"/>
                <span class="help-block" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>
            </div>
        </div>

        <!-- END DATE -->
        <div class="form-group" th:classappend="${#fields.hasErrors('endDate')} ? 'has-error'">
            <label class="col-sm-2 control-label">End Date:</label>
            <div class="col-sm-10">
                <input type="date" class="form-control" th:field="*{endDate}"/>
                <span class="help-block" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></span>
            </div>
        </div>

        <!-- STATUS -->
        <div class="form-group" th:classappend="${#fields.hasErrors('status')} ? 'has-error'">
            <label class="col-sm-2 control-label">Status:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" th:field="*{status}" placeholder="active, closed, paused, etc."/>
                <span class="help-block" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
            </div>
        </div>

        <!-- CONTRACTOR COMPANY (ID) -->
        <div class="form-group" th:classappend="${#fields.hasErrors('contractorCompanyId')} ? 'has-error'">
            <label class="col-sm-2 control-label">Contractor:</label>
            <div class="col-sm-10">
                <select class="form-control" th:field="*{contractorCompanyId}">
                    <option value="" disabled>Select a contractor</option>
                    <option th:each="company : ${companies}"
                            th:value="${company.id}"
                            th:text="${company.name}">
                    </option>
                </select>
                <span class="help-block" th:if="${#fields.hasErrors('contractorCompanyId')}" th:errors="*{contractorCompanyId}"></span>
            </div>
        </div>

        <!-- CLIENT (ID) -->
        <div class="form-group" th:classappend="${#fields.hasErrors('clientId')} ? 'has-error'">
            <label class="col-sm-2 control-label">Client:</label>
            <div class="col-sm-10">
                <select class="form-control" th:field="*{clientId}">
                    <option value="" disabled>Select a client</option>
                    <option th:each="client : ${clients}"
                            th:value="${client.id}"
                            th:text="${client.name}">
                    </option>
                </select>
                <span class="help-block" th:if="${#fields.hasErrors('clientId')}" th:errors="*{clientId}"></span>
            </div>
        </div>

        <!-- DAILY RATE -->
        <div class="form-group" th:classappend="${#fields.hasErrors('dailyRate')} ? 'has-error'">
            <label class="col-sm-2 control-label">Daily Rate (€):</label>
            <div class="col-sm-10">
                <input type="number" min="0" step="0.01" class="form-control" th:field="*{dailyRate}" required/>
                <span class="help-block" th:if="${#fields.hasErrors('dailyRate')}" th:errors="*{dailyRate}"></span>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="row">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary">Save Project</button>
                <a th:href="@{/project/list}" class="btn btn-default">Cancel</a>
            </div>
        </div>

    </form>
</div>

<!-- jQuery -->
<script src="http://cdn.jsdelivr.net/webjars/jquery/2.1.4/jquery.min.js"
        th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>

</body>
</html>
